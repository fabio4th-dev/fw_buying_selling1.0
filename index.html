            background: #0a0c10;
            min-height: 100vh;
            color: #e1e9f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 4px;
        }

        .sidebar {
            width: 280px;
            background: #0f172a;
            color: #e1e9f0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2d3748;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #2d3748;
        }

        .sidebar-header img {
            width: 160px;
            height: 95px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .sidebar-header h3 {
            font-size: 14px;
            font-weight: 300;
            color: #94a3b8;
        }

        .sidebar-menu {
            flex: 1;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }

        .menu-item i {
            font-size: 20px;
            width: 24px;
        }

        .menu-item:hover {
            background: #1e293b;
            color: #60a5fa;
        }

        .menu-item.active {
            background: #1e293b;
            color: #60a5fa;
            border-left: 3px solid #3b82f6;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            gap: 15px;

        }

        .sidebar-footer img {

        .main-content {

            overflow-y: auto;

            background: #0a0c10;
        }

        .top-bar {
            background: #1a1f2b;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2d3748;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: #60a5fa;
        }

        .logos-secundarios {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logos-secundarios img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #1a1f2b;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #2d3748;
            animation: slideInUp 0.6s ease;
            animation-fill-mode: both;
        }

        @keyframes slideInUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2d3748;
        }

        .card-header h2 {
            font-size: 16px;
            color: #60a5fa;
            font-weight: 600;
        }

        .badge {
            background: #1e293b;
            color: #60a5fa;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #3b82f6;
        }

        .badge-success { background: #059669; color: white; border-color: #10b981; }
        .badge-warning { background: #d97706; color: white; border-color: #f59e0b; }
        .badge-danger { background: #dc2626; color: white; border-color: #ef4444; }

        .grid-2, .grid-3, .grid-4 {
            display: grid;
            gap: 20px;
        }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            color: #e1e9f0;
        }

        th {
            background: #1e293b;
            color: #94a3b8;
            padding: 12px;
            font-weight: 600;
            text-align: left;
            border-bottom: 2px solid #3b82f6;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #334155;
        }

        tr:hover { background: #2d3748; }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 10px 15px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 14px;
            color: #e1e9f0;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-success { background: #059669; color: white; }
        .btn-success:hover { background: #047857; transform: translateY(-2px); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; transform: translateY(-2px); }
        .btn-secondary { background: #475569; color: white; }

        .progress {
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);

        .tabs {
            display: flex;
            gap: 2px;
            border-bottom: 1px solid #2d3748;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover { color: #60a5fa; background: #1e293b; }
        .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; background: #1e293b; }

        .tab-content { transition: opacity 0.4s ease; }

        .logo-img {
            height: 35px;
            width: auto;
            object-fit: contain;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 16, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            width: 0%;
            transition: width 0.3s ease;
        }

            background: #1e3a5f;
            color: #e1e9f0;
            padding: 10px 20px;
            margin: 0 0 20px 0;

            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            border-left: 5px solid #3b82f6;

        .gauge-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
        }

        .gauge-container {
            position: relative;
            width: 200px;
            height: 100px;
            overflow: hidden;
        }

        .gauge-bg {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #1e293b;
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .gauge-fill {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #3b82f6 0deg, #60a5fa var(--progress-deg), transparent var(--progress-deg));
            transform: rotate(-90deg);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gauge-cover {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #1a1f2b;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #334155;
        }

        .gauge-value { font-size: 22px; font-weight: bold; color: #60a5fa; }
        .gauge-label { font-size: 12px; color: #94a3b8; }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .po-item-row {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #334155;
        }

        .total-value { font-size: 24px; font-weight: bold; color: #60a5fa; }
        .po-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .item-remove { color: #dc2626; cursor: pointer; font-size: 12px; text-align: right; display: inline-block; padding: 5px 10px; }
        .item-remove:hover { color: #ef4444; text-decoration: underline; }
        .table-responsive { overflow-x: auto; max-height: 500px; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
    </style>
</head>

        function updateLoadingProgress(percent, message) {

        function showInfo(message, type = 'info') {
            const infoBar = document.getElementById('infoBar');
            const infoMessage = document.getElementById('infoMessage');
            const infoIcon = document.getElementById('infoIcon');
            infoMessage.innerHTML = message;
            if (type === 'success') { infoBar.style.background = '#065f46'; infoIcon.className = 'fas fa-check-circle'; }
            else if (type === 'error') { infoBar.style.background = '#7f1d1d'; infoIcon.className = 'fas fa-exclamation-circle'; }
            else { infoBar.style.background = '#1e3a5f'; infoIcon.className = 'fas fa-cloud'; }

        function renderGauge(progresso) {
            const degrees = (progresso / 100) * 180;
            return `
                <div class="gauge-wrapper">
                    <div class="gauge-container">
                        <div class="gauge-bg"><div class="gauge-fill" style="--progress-deg: ${degrees}deg;"></div></div>
                        <div class="gauge-cover"><span class="gauge-value">${progresso}%</span><span class="gauge-label">Progresso</span></div>
                    </div>
                </div>
            `;
        }

        function renderCurvaSChart(curvaSData, containerId) {
            if (!curvaSData || curvaSData.length === 0) return;
            setTimeout(() => {
                const canvas = document.getElementById(containerId);
                if (!canvas) return;
                const labels = curvaSData.map(item => `${item.mes}/${item.dia}`);
                const realAcum = curvaSData.map(item => item.realAcum);
                const lbAcum = curvaSData.map(item => item.lbAcum);
                const forecast = curvaSData.map(item => item.forecast2);
                const ctx = canvas.getContext('2d');
                let existingChart = Chart.getChart(ctx);
                if (existingChart) existingChart.destroy();
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Real Acumulado', data: realAcum, borderColor: '#3b82f6', borderWidth: 3, tension: 0.1, fill: false, pointBackgroundColor: '#3b82f6', pointRadius: 3 },
                            { label: 'Line Base', data: lbAcum, borderColor: '#f59e0b', borderWidth: 3, tension: 0.1, fill: false, pointBackgroundColor: '#f59e0b', pointRadius: 3 },
                            { label: 'Forecast', data: forecast, borderColor: '#10b981', borderWidth: 3, borderDash: [5, 5], tension: 0.1, fill: false, pointBackgroundColor: '#10b981', pointRadius: 3 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { tooltip: { backgroundColor: '#1e293b', titleColor: '#60a5fa' } }, scales: { y: { beginAtZero: true, max: 100, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxRotation: 45 } } } }
                });
            }, 200);
        }

        function changePage(page, event) {
            if (event) {

            const titles = { 'dashboard': 'Dashboard', 'projetos': 'Projetos', 'ss': 'Abertura de SS/Ordem de Compra', 'pedido_compra': 'Sistema de Pedido de Compra', 'os': 'Ordem de Serviço', 'rdo': 'Gerar RDO', 'hht': 'HHT e Mão de Obra', 'cronograma': 'Cronograma', 'indicadores': 'Indicadores e Controles' };
            document.getElementById('pageTitle').textContent = titles[page];
            loadContent(page);
        }

        function loadContent(page) {
            const contentArea = document.getElementById('contentArea');
            contentArea.style.opacity = '0';
            setTimeout(() => {
                switch (page) {
                    case 'dashboard': contentArea.innerHTML = renderDashboard(); break;
                    case 'projetos': contentArea.innerHTML = renderProjetos(); break;
                    case 'ss': contentArea.innerHTML = renderSS(); break;
                    case 'pedido_compra': contentArea.innerHTML = renderPedidoCompra(); break;
                    case 'os': contentArea.innerHTML = renderOS(); break;
                    case 'rdo': contentArea.innerHTML = renderRDO(); break;
                    case 'hht': contentArea.innerHTML = renderHHT(); break;
                    case 'cronograma': contentArea.innerHTML = renderCronograma(); break;
                    case 'indicadores': contentArea.innerHTML = renderIndicadores(); break;

                contentArea.style.opacity = '1';
                setTimeout(() => {
                    projetos.forEach(projeto => {

                            renderCurvaSChart(projeto.curvaS, `curvaSChart-${projeto.id}`);

                }, 500);
            }, 300);
        }

                    </div>
                    <div class="tabs">
                        <div class="tab active" onclick="showPoTab(this, 'lista')">Lista de Pedidos</div>
                        <div class="tab" onclick="showPoTab(this, 'novo')">Novo Pedido</div>
                    </div>
                    <div id="po-lista" class="tab-content" style="display: block;">${renderPoList()}</div>
                    <div id="po-novo" class="tab-content" style="display: none;">${renderPoForm()}</div>
                </div>
            `;
        }

        function renderPoList() {
            if (purchaseOrders.length === 0) return '<div style="text-align:center; padding:40px;">Nenhum pedido cadastrado.</div>';
            return `<div class="table-responsive"><table><thead><tr><th>Nº</th><th>Data</th><th>Fornecedor</th><th>Centro Custo</th><th>Total</th><th>Status</th><th>Ações</th></tr></thead><tbody>${purchaseOrders.map(po => { const total = po.items.reduce((s,i)=>s+i.total,0)-po.desconto+po.frete; const statusClass = po.status==='Aprovado'?'badge-success':(po.status==='Cancelado'?'badge-danger':'badge-warning'); return `<tr><td><strong>${po.numero}</strong></td><td>${new Date(po.data).toLocaleDateString()}</td><td>${po.fornecedor.substring(0,30)}</td><td>${po.centroCusto.substring(0,30)}</td><td><strong>R$ ${total.toFixed(2)}</strong></td><td><span class="po-status ${statusClass}">${po.status}</span></td><td class="action-buttons"><button class="btn btn-secondary btn-sm" onclick="viewPoDetails(${po.id})"><i class="fas fa-eye"></i> Ver</button><button class="btn btn-success btn-sm" onclick="exportPoToExcel(${po.id})"><i class="fas fa-file-excel"></i> Excel</button><button class="btn btn-danger btn-sm" onclick="deletePo(${po.id})"><i class="fas fa-trash"></i> Excluir</button></td></tr>`}).join('')}</tbody></table></div>`;
        }

        function renderPoForm() {
            return `<form id="poForm" onsubmit="savePurchaseOrder(event)"><div class="grid-2"><div><div class="form-group"><label>Nº Pedido:</label><input type="text" class="form-control" id="poNumero" value="${nextPoId}" readonly></div><div class="form-group"><label>Data:</label><input type="date" class="form-control" id="poData" value="${new Date().toISOString().split('T')[0]}" required></div><div class="form-group"><label>Fornecedor:</label><input type="text" class="form-control" id="poFornecedor" placeholder="Nome do fornecedor" required></div><div class="form-group"><label>CNPJ:</label><input type="text" class="form-control" id="poCnpj" placeholder="00.000.000/0001-00"></div><div class="form-group"><label>Vendedor:</label><input type="text" class="form-control" id="poVendedor" placeholder="Nome do vendedor"></div></div><div><div class="form-group"><label>Centro de Custo:</label><select class="form-control" id="poCentroCusto"><option value="">Selecione...</option>${projetos.map(p => `<option value="${p.nome}">${p.nome}</option>`).join('')}<option value="PC 4501089929 - ANDRITZ - Bracell Lençóis Paulista - Montagem Tissue">PC 4501089929 - ANDRITZ</option></select></div><div class="form-group"><label>Requisitante:</label><input type="text" class="form-control" id="poRequisitante" placeholder="Nome"></div><div class="form-group"><label>Condição Pagamento:</label><select class="form-control" id="poCondicaoPagamento"><option>Boleto</option><option>Transferência</option><option>Pix</option></select></div><div class="form-group"><label>Status:</label><select class="form-control" id="poStatus"><option>Em Andamento</option><option>Aprovado</option><option>Cancelado</option></select></div></div></div><div class="card-header"><h2>Itens</h2><button type="button" class="btn btn-primary" onclick="addPoItem()">+ Adicionar</button></div><div id="poItemsContainer"><div class="po-item-row"><div class="grid-4"><div><label>Descrição</label><input type="text" class="form-control" placeholder="Descrição"></div><div><label>Unidade</label><input type="text" class="form-control" placeholder="und"></div><div><label>Qtd</label><input type="number" class="form-control" value="1" onchange="updatePoTotal()"></div><div><label>Preço Unit.</label><input type="number" class="form-control" step="0.01" value="0" onchange="updatePoTotal()"></div></div></div></div><div class="grid-2"><div><div class="form-group"><label>Desconto (R$):</label><input type="number" class="form-control" id="poDesconto" step="0.01" value="0" onchange="updatePoTotal()"></div><div class="form-group"><label>Frete (R$):</label><input type="number" class="form-control" id="poFrete" step="0.01" value="0" onchange="updatePoTotal()"></div></div><div style="text-align:right;"><h3>Total: <span id="poTotalPreview" class="total-value">R$ 0.00</span></h3></div></div><div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;"><button type="button" class="btn btn-secondary" onclick="clearPoForm()">Limpar</button><button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Salvar</button></div></form>`;
        }

        function addPoItem() {
            const container = document.getElementById('poItemsContainer');
            const newItem = document.createElement('div');
            newItem.className = 'po-item-row';
            newItem.innerHTML = `<div class="grid-4"><div><label>Descrição</label><input type="text" class="form-control" placeholder="Descrição"></div><div><label>Unidade</label><input type="text" class="form-control" placeholder="und"></div><div><label>Qtd</label><input type="number" class="form-control" value="1" onchange="updatePoTotal()"></div><div><label>Preço Unit.</label><input type="number" class="form-control" step="0.01" value="0" onchange="updatePoTotal()"></div></div><div style="text-align:right;"><span class="item-remove" onclick="this.parentElement.parentElement.remove(); updatePoTotal();"><i class="fas fa-trash"></i> Remover</span></div>`;
            container.appendChild(newItem);
        }

        function updatePoTotal() {
            let total = 0;
            document.querySelectorAll('#poItemsContainer .po-item-row').forEach(row => {
                const qtd = parseFloat(row.querySelector('input[placeholder*="Qtd"]')?.value) || 0;
                const preco = parseFloat(row.querySelector('input[placeholder*="Preço"]')?.value) || 0;
                total += qtd * preco;
            });
            const desconto = parseFloat(document.getElementById('poDesconto')?.value) || 0;
            const frete = parseFloat(document.getElementById('poFrete')?.value) || 0;
            const preview = document.getElementById('poTotalPreview');
            if (preview) preview.textContent = `R$ ${(total - desconto + frete).toFixed(2)}`;
        }

        function savePurchaseOrder(event) {
            event.preventDefault();
            const items = [];
            document.querySelectorAll('#poItemsContainer .po-item-row').forEach(row => {
                const descricao = row.querySelector('input[placeholder*="Descrição"]')?.value;
                const unidade = row.querySelector('input[placeholder*="Unidade"]')?.value;
                const quantidade = parseFloat(row.querySelector('input[placeholder*="Qtd"]')?.value) || 0;
                const preco = parseFloat(row.querySelector('input[placeholder*="Preço"]')?.value) || 0;
                if (descricao && quantidade > 0 && preco > 0) items.push({ descricao, unidade: unidade || 'und', quantidade, precoUnitario: preco, total: quantidade * preco });
            });
            if (items.length === 0) { alert('Adicione pelo menos um item!'); return; }
            purchaseOrders.push({ id: nextPoId, numero: nextPoId.toString(), data: document.getElementById('poData').value, fornecedor: document.getElementById('poFornecedor').value, cnpj: document.getElementById('poCnpj').value, vendedor: document.getElementById('poVendedor').value, centroCusto: document.getElementById('poCentroCusto').value, requisitante: document.getElementById('poRequisitante').value, condicaoPagamento: document.getElementById('poCondicaoPagamento').value, status: document.getElementById('poStatus').value, items, desconto: parseFloat(document.getElementById('poDesconto').value) || 0, frete: parseFloat(document.getElementById('poFrete').value) || 0 });
            nextPoId++;
            alert(`Pedido ${nextPoId-1} criado!`);
            clearPoForm();
            showPoTab(document.querySelector('#po-lista + .tab'), 'lista');
            document.getElementById('po-lista').innerHTML = renderPoList();
            showInfo(`Pedido criado com sucesso!`, 'success');
        }

        function clearPoForm() {
            document.getElementById('poFornecedor').value = '';
            document.getElementById('poCnpj').value = '';
            document.getElementById('poVendedor').value = '';
            document.getElementById('poCentroCusto').value = '';
            document.getElementById('poRequisitante').value = '';
            document.getElementById('poDesconto').value = '0';
            document.getElementById('poFrete').value = '0';
            document.getElementById('poItemsContainer').innerHTML = `<div class="po-item-row"><div class="grid-4"><div><label>Descrição</label><input type="text" class="form-control" placeholder="Descrição"></div><div><label>Unidade</label><input type="text" class="form-control" placeholder="und"></div><div><label>Qtd</label><input type="number" class="form-control" value="1"></div><div><label>Preço Unit.</label><input type="number" class="form-control" step="0.01" value="0"></div></div></div>`;
            updatePoTotal();
        }

        function viewPoDetails(poId) {
            const po = purchaseOrders.find(p => p.id === poId);
            if (!po) return;
            const total = po.items.reduce((s,i)=>s+i.total,0)-po.desconto+po.frete;
            alert(`PEDIDO Nº ${po.numero}\nData: ${new Date(po.data).toLocaleDateString()}\nFornecedor: ${po.fornecedor}\nTotal: R$ ${total.toFixed(2)}\nStatus: ${po.status}\nItens: ${po.items.length}`);
        }

        async function exportPoToExcel(poId) {
            const po = purchaseOrders.find(p => p.id === poId);
            if (!po) { alert('Pedido não encontrado!'); return; }
            showInfo('Gerando Excel...', 'info');
            try {
                const workbook = new ExcelJS.Workbook();
                const ws = workbook.addWorksheet('Pedido de Compra');
                ws.getCell('A1').value = 'PEDIDO DE COMPRA'; ws.mergeCells('A1:E1'); ws.getCell('A1').font = { bold: true, size: 16 };
                ws.getCell('A3').value = 'Nº:'; ws.getCell('B3').value = po.numero;
                ws.getCell('A4').value = 'Data:'; ws.getCell('B4').value = new Date(po.data).toLocaleDateString();
                ws.getCell('A5').value = 'Fornecedor:'; ws.getCell('B5').value = po.fornecedor;
                ws.getCell('A6').value = 'CNPJ:'; ws.getCell('B6').value = po.cnpj;
                ws.getCell('A7').value = 'Centro Custo:'; ws.getCell('B7').value = po.centroCusto;
                ws.getCell('A9').value = 'Descrição'; ws.getCell('B9').value = 'Unid'; ws.getCell('C9').value = 'Qtd'; ws.getCell('D9').value = 'Preço'; ws.getCell('E9').value = 'Total';
                ws.getRow(9).font = { bold: true };
                po.items.forEach((item, i) => {
                    ws.getCell(10+i,1).value = item.descricao;
                    ws.getCell(10+i,2).value = item.unidade;
                    ws.getCell(10+i,3).value = item.quantidade;
                    ws.getCell(10+i,4).value = item.precoUnitario;
                    ws.getCell(10+i,5).value = item.total;
                });
                const subtotal = po.items.reduce((s,i)=>s+i.total,0);
                const totalRow = 10 + po.items.length;
                ws.getCell(totalRow,4).value = 'Subtotal:'; ws.getCell(totalRow,5).value = subtotal;
                ws.getCell(totalRow+1,4).value = 'Desconto:'; ws.getCell(totalRow+1,5).value = po.desconto;
                ws.getCell(totalRow+2,4).value = 'Frete:'; ws.getCell(totalRow+2,5).value = po.frete;
                ws.getCell(totalRow+3,4).value = 'TOTAL:'; ws.getCell(totalRow+3,5).value = subtotal - po.desconto + po.frete;
                ws.getCell(totalRow+3,5).font = { bold: true };
                ws.columns = [{ width: 40 }, { width: 10 }, { width: 12 }, { width: 15 }, { width: 15 }];
                const buffer = await workbook.xlsx.writeBuffer();
                saveAs(new Blob([buffer]), `Pedido_Compra_${po.numero}.xlsx`);
                showInfo(`Pedido ${po.numero} exportado!`, 'success');
            } catch (error) { alert('Erro: ' + error.message); }
        }

        function deletePo(poId) {
            if (confirm('Excluir este pedido?')) {
                purchaseOrders = purchaseOrders.filter(p => p.id !== poId);
                document.getElementById('po-lista').innerHTML = renderPoList();
                showInfo('Pedido excluído!', 'success');
            }
        }

        function showNewPoForm() { showPoTab(document.querySelector('#po-novo + .tab'), 'novo'); }
        function showPoTab(element, tabId) {
            const tabs = element.parentElement.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            const card = element.closest('.card');
            card.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(`po-${tabId}`).style.display = 'block';
            if (tabId === 'novo') clearPoForm();
        }

        window.changePage = changePage;
        window.showProjectTab = showProjectTab;
        window.addPoItem = addPoItem;
        window.updatePoTotal = updatePoTotal;
        window.savePurchaseOrder = savePurchaseOrder;
        window.clearPoForm = clearPoForm;
        window.viewPoDetails = viewPoDetails;
        window.exportPoToExcel = exportPoToExcel;
        window.deletePo = deletePo;
        window.showNewPoForm = showNewPoForm;
        window.showPoTab = showPoTab;

        window.onload = async function () {
            updateLoadingProgress(20, 'Carregando módulos...');
            await new Promise(r => setTimeout(r, 200));
            updateLoadingProgress(50, 'Carregando projetos e Curva S...');
            await new Promise(r => setTimeout(r, 200));
            updateLoadingProgress(80, 'Preparando interface...');
            await new Promise(r => setTimeout(r, 200));
            updateLoadingProgress(100, 'Sistema pronto!');
            await new Promise(r => setTimeout(r, 500));
            hideLoading();
            loadContent('dashboard');
            showInfo('Sistema carregado com sucesso! Módulo Pedido de Compra disponível.', 'success');
        };
    </script>
</body>

</html>
