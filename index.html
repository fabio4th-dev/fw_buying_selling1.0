<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FW Company - Sistema de Gestão Documental EAP</title>
    <link rel="icon" type="image/x-icon" href="fw_mini.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0c10; color: #e1e9f0; display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: #0f172a; display: flex; flex-direction: column; border-right: 1px solid #2d3748; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #2d3748; }
        .sidebar-header img { width: 140px; height: auto; object-fit: contain; margin-bottom: 10px; }
        .sidebar-header h3 { font-size: 14px; font-weight: 300; color: #94a3b8; }
        .sidebar-menu { flex: 1; padding: 20px 10px; overflow-y: auto; }
        .menu-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: #94a3b8; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: all 0.3s; }
        .menu-item i { font-size: 20px; width: 24px; }
        .menu-item:hover, .menu-item.active { background: #1e293b; color: #60a5fa; }
        .menu-item.active { border-left: 3px solid #3b82f6; }
        .sidebar-footer { padding: 20px; border-top: 1px solid #2d3748; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .sidebar-footer img { height: 35px; width: auto; object-fit: contain; opacity: 0.8; }
        
        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; background: #0a0c10; }
        .top-bar { background: #1a1f2b; border-radius: 15px; padding: 15px 25px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2d3748; }
        .page-title { font-size: 22px; font-weight: 600; color: #60a5fa; }
        .logos-secundarios { display: flex; align-items: center; gap: 20px; }
        .logos-secundarios img { height: 40px; width: auto; object-fit: contain; }
        .content-container { display: flex; flex-direction: column; gap: 20px; }
        
        /* Cards */
        .card { background: #1a1f2b; border-radius: 15px; padding: 25px; border: 1px solid #2d3748; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #2d3748; }
        .card-header h2 { font-size: 18px; color: #60a5fa; font-weight: 600; }
        .badge { background: #1e293b; color: #60a5fa; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid #3b82f6; }
        .badge-success { background: #059669; color: white; }
        .badge-warning { background: #d97706; color: white; }
        .badge-info { background: #3b82f6; color: white; }
        
        /* Grid */
        .grid-2, .grid-3, .grid-4 { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        
        /* EAP Tree */
        .eap-tree { margin-top: 20px; }
        .eap-node { margin-left: 20px; padding-left: 20px; border-left: 2px solid #3b82f6; }
        .eap-item { padding: 12px 15px; margin: 8px 0; background: #1e293b; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .eap-item:hover { background: #2d3748; transform: translateX(5px); }
        .eap-item.active { background: #3b82f6; color: white; }
        .eap-code { font-family: monospace; font-weight: bold; color: #60a5fa; margin-right: 15px; }
        .eap-name { flex: 1; }
        .eap-count { background: #0f172a; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        
        /* Documentos */
        .document-card { background: #1e293b; border-radius: 10px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; transition: all 0.3s; display: flex; align-items: center; gap: 15px; }
        .document-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
        .document-icon { font-size: 32px; color: #3b82f6; }
        .document-info { flex: 1; }
        .document-title { font-weight: 600; color: #60a5fa; margin-bottom: 5px; }
        .document-meta { font-size: 12px; color: #94a3b8; display: flex; gap: 15px; flex-wrap: wrap; }
        .document-actions { display: flex; gap: 10px; }
        
        /* PO Items */
        .po-item-row { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .total-value { font-size: 24px; font-weight: bold; color: #60a5fa; }
        .item-remove { color: #dc2626; cursor: pointer; font-size: 12px; text-align: right; display: inline-block; padding: 5px 10px; }
        .item-remove:hover { color: #ef4444; text-decoration: underline; }
        
        /* Upload Area */
        .upload-area { background: #1e293b; border: 2px dashed #3b82f6; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .upload-area:hover { background: #2d3748; border-color: #60a5fa; }
        .upload-area i { font-size: 48px; color: #3b82f6; margin-bottom: 15px; }
        
        /* Forms */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-weight: 500; font-size: 12px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 10px 15px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; font-size: 14px; color: #e1e9f0; }
        .form-control:focus { outline: none; border-color: #3b82f6; }
        select.form-control, textarea.form-control { background: #1e293b; }
        
        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-success { background: #059669; color: white; }
        .btn-success:hover { background: #047857; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-secondary { background: #475569; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        
        /* Stats Cards */
        .stat-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #334155; }
        .stat-value { font-size: 32px; font-weight: bold; color: #60a5fa; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 5px; text-transform: uppercase; }
        
        /* Loading */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,12,16,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(8px); transition: opacity 0.5s; }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-spinner { width: 50px; height: 50px; border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-bar { background: #1e3a5f; padding: 10px 20px; margin-bottom: 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border-left: 5px solid #3b82f6; }
        .table-responsive { overflow-x: auto; }
        .chart-container { height: 300px; position: relative; }
        .action-buttons { display: flex; gap: 8px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; border-bottom: 1px solid #2d3748; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; cursor: pointer; color: #94a3b8; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab:hover, .tab.active { color: #60a5fa; }
        .tab.active { border-bottom-color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div id="loadingText" style="color:#94a3b8;">Carregando sistema...</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="FW Logo.png" alt="FW Logo" onerror="this.style.display='none'">
            <h3>Sistema P.C. e Documentações</h3>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" onclick="changePage('dashboard', event)"><i class="fas fa-chart-pie"></i><span>Dashboard</span></div>
            <div class="menu-item" onclick="changePage('eap', event)"><i class="fas fa-diagram-project"></i><span>EAP - Estrutura</span></div>
            <div class="menu-item" onclick="changePage('documentos', event)"><i class="fas fa-folder-open"></i><span>Documentos</span></div>
            <div class="menu-item" onclick="changePage('upload', event)"><i class="fas fa-upload"></i><span>Upload</span></div>
            <div class="menu-item" onclick="changePage('pedido_compra', event)"><i class="fas fa-shopping-cart"></i><span>Pedido de Compra</span></div>
        </div>
        <div class="sidebar-footer">
            <img src="Delservin LOGO.png" alt="Delservin">
            <img src="Altercon LOGO.png" alt="Altercon">
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title" id="pageTitle">Dashboard EAP</div>
            <div class="logos-secundarios">
                <img src="Delservin LOGO.png" alt="Delservin">
                <img src="Altercon LOGO.png" alt="Altercon">
            </div>
        </div>
        <div class="info-bar" id="infoBar" style="display: none;"><i class="fas fa-info-circle"></i><span id="infoMessage"></span></div>
        <div class="content-container" id="contentArea"></div>
    </div>

    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://eokhafnfmynhridksnuh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVva2hhZm5mbXluaHJpZGtzbnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ1MjE2MDAsImV4cCI6MjA1MDA5NzYwMH0.0z0ZvZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZm';
        let supabaseClient = null;
        
        // EAP Estrutura
        const eapStructure = [
            { code: '1.0', name: 'Projeto Industrial - Fábrica', level: 1, parent: null },
            { code: '1.1', name: 'Gestão de Projeto', level: 2, parent: '1.0' },
            { code: '1.1.1', name: 'Plano de Projeto e Cronograma', level: 3, parent: '1.1' },
            { code: '1.1.2', name: 'Relatórios de Progresso', level: 3, parent: '1.1' },
            { code: '1.1.3', name: 'Documentação de Riscos', level: 3, parent: '1.1' },
            { code: '1.2', name: 'Engenharia - Documentos Técnicos', level: 2, parent: '1.0' },
            { code: '1.2.1', name: 'Engenharia Básica (P&IDs, Fluxogramas)', level: 3, parent: '1.2' },
            { code: '1.2.2', name: 'Engenharia Detalhada', level: 3, parent: '1.2' },
            { code: '1.2.3', name: 'Data Sheets de Equipamentos', level: 3, parent: '1.2' },
            { code: '1.3', name: 'Aquisições - Documentos de Compras', level: 2, parent: '1.0' },
            { code: '1.3.1', name: 'Requisições de Materiais', level: 3, parent: '1.3' },
            { code: '1.3.2', name: 'Ordens de Compra', level: 3, parent: '1.3' },
            { code: '1.3.3', name: 'Pedidos de Compra (PC)', level: 3, parent: '1.3' },
            { code: '1.4', name: 'Construção e Montagem', level: 2, parent: '1.0' },
            { code: '1.4.1', name: 'Planos de Rigging', level: 3, parent: '1.4' },
            { code: '1.4.2', name: 'Procedimentos de Solda', level: 3, parent: '1.4' },
            { code: '1.4.3', name: 'Diários de Obra (RDO)', level: 3, parent: '1.4' },
            { code: '1.5', name: 'Comissionamento e Entrega', level: 2, parent: '1.0' },
            { code: '1.5.1', name: 'Protocolos de Teste', level: 3, parent: '1.5' },
            { code: '1.5.2', name: 'Manuais de Operação (As-Built)', level: 3, parent: '1.5' }
        ];
        
        let documentos = [];
        let selectedEapNode = null;
        
        // Pedidos de Compra
        let purchaseOrders = [
            { id: 38454, numero: '38454', data: '2024-04-05', fornecedor: 'Zagar Comercio de Ferramentas e Ferragens LTDA EPP', cnpj: '01.864.998/0001-35', vendedor: 'Robinson', centroCusto: 'PC 4501089929 - ANDRITZ - Bracell Lençóis Paulista - Montagem Tissue', requisitante: 'Fabio Mendes', condicaoPagamento: 'Boleto', status: 'Em Andamento', items: [
                { descricao: 'TRENA 5M LUFKIN', unidade: 'und', quantidade: 6, precoUnitario: 24.21, total: 145.26 },
                { descricao: 'BALDE PLAST PEDREIRO 12L', unidade: 'und', quantidade: 1, precoUnitario: 19.30, total: 19.30 },
                { descricao: 'FUNIL FLEX PLAST', unidade: 'und', quantidade: 1, precoUnitario: 29.42, total: 29.42 },
                { descricao: 'NIVEL BASE MAGNETICA KALA 30CM', unidade: 'und', quantidade: 5, precoUnitario: 35.22, total: 176.10 }
            ], desconto: 10.57, frete: 0 }
        ];
        let nextPoId = 38455;
        
        function showLoading(msg) { 
            const el = document.getElementById('loadingText');
            if (el) el.textContent = msg; 
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.remove('hidden'); 
        }
        function hideLoading() { 
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('hidden'); 
        }
        function showInfo(msg, type = 'info') { 
            let bar = document.getElementById('infoBar'), msgSpan = document.getElementById('infoMessage');
            if (!bar || !msgSpan) return;
            msgSpan.textContent = msg;
            bar.style.background = type === 'success' ? '#065f46' : type === 'error' ? '#7f1d1d' : '#1e3a5f';
            bar.style.display = 'flex';
            setTimeout(() => bar.style.display = 'none', 4000);
        }
        
        async function loadDocumentosFromSupabase() {
            if (!supabaseClient) supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            try {
                const { data, error } = await supabaseClient.from('documentos').select('*').order('data_upload', { ascending: false });
                if (error) throw error;
                documentos = data || [];
                return documentos;
            } catch (error) {
                console.error('Erro:', error);
                return [];
            }
        }
        
        function getDocumentsByEapCode(eapCode) { return documentos.filter(doc => doc.eap_code === eapCode); }
        
        function renderEapTree(selectedCode = null) {
            const buildTree = (parentCode) => {
                const nodes = eapStructure.filter(node => node.parent === parentCode);
                if (nodes.length === 0) return '';
                return nodes.map(node => `
                    <div class="eap-node">
                        <div class="eap-item ${selectedCode === node.code ? 'active' : ''}" onclick="selectEapNode('${node.code}')">
                            <span class="eap-code">${node.code}</span>
                            <span class="eap-name">${node.name}</span>
                            <span class="eap-count">${getDocumentsByEapCode(node.code).length} docs</span>
                        </div>
                        ${buildTree(node.code)}
                    </div>
                `).join('');
            };
            return `<div class="eap-tree">${buildTree(null)}</div>`;
        }
        
        function renderDashboard() {
            const totalDocs = documentos.length;
            const eapComDocs = eapStructure.filter(node => getDocumentsByEapCode(node.code).length > 0);
            const progressoDocumental = eapStructure.length > 0 ? (eapComDocs.length / eapStructure.length * 100).toFixed(1) : 0;
            const totalPedidos = purchaseOrders.length;
            const valorTotalPedidos = purchaseOrders.reduce((sum, po) => sum + (po.items.reduce((s,i)=>s+i.total,0) - po.desconto + po.frete), 0);
            
            return `
                <div class="grid-3">
                    <div class="stat-card"><div class="stat-value">${totalDocs}</div><div class="stat-label">Total de Documentos</div></div>
                    <div class="stat-card"><div class="stat-value">${eapComDocs.length}</div><div class="stat-label">EAPs com Documentos</div></div>
                    <div class="stat-card"><div class="stat-value">${progressoDocumental}%</div><div class="stat-label">Progresso Documental</div></div>
                </div>
                <div class="grid-3">
                    <div class="stat-card"><div class="stat-value">${totalPedidos}</div><div class="stat-label">Pedidos de Compra</div></div>
                    <div class="stat-card"><div class="stat-value">R$ ${valorTotalPedidos.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div><div class="stat-label">Valor Total em PC</div></div>
                    <div class="stat-card"><div class="stat-value">${purchaseOrders.filter(p => p.status === 'Em Andamento').length}</div><div class="stat-label">PCs em Andamento</div></div>
                </div>
                <div class="card">
                    <div class="card-header"><h2><i class="fas fa-diagram-project"></i> EAP com Documentos</h2></div>
                    <div class="table-responsive"><table style="width:100%"><thead><tr><th>Código EAP</th><th>Nome</th><th>Documentos</th> </thead><tbody>${eapComDocs.map(node => `


<td><strong>${node.code}</strong>${node.name}<span class="badge">${getDocumentsByEapCode(node.code).length}</span>`).join('')}</tbody></table></div>
                </div>
            `;
        }
        
        function renderEapPage() {
            return `<div class="grid-2"><div class="card"><div class="card-header"><h2><i class="fas fa-diagram-project"></i> Estrutura Analítica do Projeto (EAP)</h2></div><div style="max-height:70vh; overflow-y:auto">${renderEapTree(selectedEapNode)}</div></div><div class="card"><div class="card-header"><h2><i class="fas fa-file-alt"></i> Documentos da EAP Selecionada</h2></div><div id="eap-documents-list">${selectedEapNode ? renderDocumentsByEap(selectedEapNode) : '<div style="text-align:center;padding:40px">Selecione um item da EAP</div>'}</div></div></div>`;
        }
        
        function renderDocumentsByEap(eapCode) {
            const node = eapStructure.find(n => n.code === eapCode);
            const docs = getDocumentsByEapCode(eapCode);
            if (!node) return '<div style="text-align:center;padding:40px">EAP não encontrada</div>';
            if (docs.length === 0) return `<div style="text-align:center;padding:40px">Nenhum documento para <strong>${node.code} - ${node.name}</strong></div>`;
            return docs.map(doc => `<div class="document-card"><div class="document-icon"><i class="fas fa-file-pdf"></i></div><div class="document-info"><div class="document-title">${doc.titulo}</div><div class="document-meta"><span><i class="fas fa-calendar"></i> ${new Date(doc.data_upload).toLocaleDateString()}</span></div><div style="font-size:12px">${doc.descricao || ''}</div></div><div class="document-actions"><button class="btn btn-primary btn-sm" onclick="downloadDocument('${doc.arquivo_url}', '${doc.arquivo_nome}')"><i class="fas fa-download"></i></button></div></div>`).join('');
        }
        
        function selectEapNode(code) { selectedEapNode = code; const div = document.getElementById('eap-documents-list'); if (div) div.innerHTML = renderDocumentsByEap(code); const treeDiv = document.querySelector('.eap-tree'); if (treeDiv) treeDiv.innerHTML = renderEapTree(code); }
        
        function renderDocumentosPage() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-folder-open"></i> Todos os Documentos</h2></div><div class="form-group"><label>Filtrar por EAP</label><select class="form-control" id="filterEap" onchange="filterDocuments()"><option value="">Todos</option>${eapStructure.map(node => `<option value="${node.code}">${node.code} - ${node.name}</option>`).join('')}</select></div><div id="all-documents-list">${renderAllDocuments()}</div></div>`;
        }
        
        function renderAllDocuments(filterEap = '') {
            let filtered = filterEap ? documentos.filter(d => d.eap_code === filterEap) : documentos;
            if (filtered.length === 0) return '<div style="text-align:center;padding:40px">Nenhum documento</div>';
            return filtered.map(doc => `<div class="document-card"><div class="document-icon"><i class="fas fa-file-pdf"></i></div><div class="document-info"><div class="document-title">${doc.titulo}</div><div class="document-meta"><span><i class="fas fa-diagram-project"></i> ${doc.eap_code || 'N/A'}</span><span><i class="fas fa-calendar"></i> ${new Date(doc.data_upload).toLocaleDateString()}</span></div></div><div class="document-actions"><button class="btn btn-primary btn-sm" onclick="downloadDocument('${doc.arquivo_url}', '${doc.arquivo_nome}')"><i class="fas fa-download"></i></button></div></div>`).join('');
        }
        
        function filterDocuments() { const filter = document.getElementById('filterEap')?.value || ''; const container = document.getElementById('all-documents-list'); if (container) container.innerHTML = renderAllDocuments(filter); }
        
        function renderUploadPage() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-upload"></i> Upload de Documentos</h2></div><div class="upload-area" onclick="document.getElementById('fileUpload').click()"><i class="fas fa-cloud-upload-alt"></i><p>Clique para selecionar um arquivo</p><small>PDF, DOC, XLSX, JPG, PNG - até 50MB</small><input type="file" id="fileUpload" style="display:none" accept=".pdf,.doc,.docx,.xlsx,.xls,.jpg,.jpeg,.png" onchange="prepareUpload(this)"></div><div id="uploadForm" style="display:none"><div class="form-group"><label>Título</label><input type="text" class="form-control" id="docTitulo"></div><div class="form-group"><label>Descrição</label><textarea class="form-control" id="docDescricao" rows="2"></textarea></div><div class="grid-2"><div class="form-group"><label>EAP</label><select class="form-control" id="docEap"><option value="">Selecione</option>${eapStructure.map(node => `<option value="${node.code}">${node.code} - ${node.name}</option>`).join('')}</select></div><div class="form-group"><label>Tipo</label><select class="form-control" id="docTipo"><option>RELATORIO</option><option>CONTRATO</option><option>NOTA_FISCAL</option></select></div></div><div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px"><button class="btn btn-secondary" onclick="cancelUpload()">Cancelar</button><button class="btn btn-success" onclick="uploadDocument()"><i class="fas fa-upload"></i> Enviar</button></div></div><div id="selectedFileInfo" style="margin-top:15px; padding:10px; background:#1e293b; border-radius:8px; display:none"><i class="fas fa-file"></i> Arquivo: <strong id="selectedFileName"></strong></div></div>`;
        }
        
        let selectedFile = null;
        function prepareUpload(input) { selectedFile = input.files[0]; if (selectedFile) { document.getElementById('selectedFileName').textContent = selectedFile.name; document.getElementById('selectedFileInfo').style.display = 'block'; document.getElementById('uploadForm').style.display = 'block'; } }
        function cancelUpload() { selectedFile = null; document.getElementById('fileUpload').value = ''; document.getElementById('selectedFileInfo').style.display = 'none'; document.getElementById('uploadForm').style.display = 'none'; }
        
        async function uploadDocument() {
            if (!selectedFile) { showInfo('Selecione um arquivo!', 'error'); return; }
            const titulo = document.getElementById('docTitulo').value;
            if (!titulo) { showInfo('Informe o título!', 'error'); return; }
            const eapCode = document.getElementById('docEap').value;
            if (!eapCode) { showInfo('Selecione a EAP!', 'error'); return; }
            if (!supabaseClient) supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            showLoading('Enviando...');
            try {
                const fileName = `${Date.now()}_${selectedFile.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                const { error: uploadError } = await supabaseClient.storage.from('documentos').upload(`documentos/${fileName}`, selectedFile);
                if (uploadError) throw uploadError;
                const { data: urlData } = supabaseClient.storage.from('documentos').getPublicUrl(`documentos/${fileName}`);
                const { error: insertError } = await supabaseClient.from('documentos').insert({ titulo: titulo, descricao: document.getElementById('docDescricao').value || '', tipo_documento: document.getElementById('docTipo').value, eap_code: eapCode, arquivo_url: urlData.publicUrl, arquivo_nome: selectedFile.name, tamanho_bytes: selectedFile.size, usuario_upload: 'usuario@fw.com.br', ativo: true });
                if (insertError) throw insertError;
                showInfo('Documento enviado!', 'success');
                cancelUpload();
                await loadDocumentosFromSupabase();
                await loadContent('dashboard');
            } catch (error) { hideLoading(); showInfo('Erro: ' + error.message, 'error'); }
        }
        
        // ==================== PEDIDO DE COMPRA ====================
        function renderPedidoCompra() {
            return `<div class="card"><div class="card-header"><h2><i class="fas fa-shopping-cart"></i> Pedidos de Compra</h2><button class="btn btn-primary" onclick="showNewPoForm()"><i class="fas fa-plus"></i> Novo Pedido</button></div><div class="tabs"><div class="tab active" onclick="switchPoTab('lista', event)">Lista de Pedidos</div><div class="tab" onclick="switchPoTab('novo', event)">Novo Pedido</div></div><div id="po-lista" class="tab-content active">${renderPoList()}</div><div id="po-novo" class="tab-content">${renderPoForm()}</div></div>`;
        }
        
        function renderPoList() {
            if (purchaseOrders.length === 0) return '<div style="text-align:center;padding:40px">Nenhum pedido</div>';
            return `<div class="table-responsive"><table style="width:100%"><thead><tr><th>Nº</th><th>Data</th><th>Fornecedor</th><th>Centro Custo</th><th>Total</th><th>Status</th><th>Ações</th> </thead><tbody>${purchaseOrders.map(po => {
                let total = po.items.reduce((s,i)=>s+i.total,0) - po.desconto + po.frete;
                let statusClass = po.status === 'Aprovado' ? 'badge-success' : (po.status === 'Cancelado' ? 'badge-danger' : 'badge-warning');
                return `<tr><td><strong>${po.numero}</strong><td>${new Date(po.data).toLocaleDateString()}<td>${po.fornecedor.substring(0,30)}<td>${po.centroCusto.substring(0,25)}<td><strong>R$ ${total.toFixed(2)}</strong><td><span class="badge ${statusClass}">${po.status}</span><td class="action-buttons"><button class="btn btn-secondary btn-sm" onclick="viewPo(${po.id})"><i class="fas fa-eye"></i></button><button class="btn btn-success btn-sm" onclick="exportPoToExcel(${po.id})"><i class="fas fa-file-excel"></i></button><button class="btn btn-danger btn-sm" onclick="deletePo(${po.id})"><i class="fas fa-trash"></i></button>`;
            }).join('')}</tbody></table></div>`;
        }
        
        function renderPoForm() {
            return `<form onsubmit="savePurchaseOrder(event)"><div class="grid-2"><div><div class="form-group"><label>Nº Pedido</label><input type="text" class="form-control" id="poNumero" value="${nextPoId}" readonly></div><div class="form-group"><label>Data</label><input type="date" class="form-control" id="poData" value="${new Date().toISOString().split('T')[0]}" required></div><div class="form-group"><label>Fornecedor</label><input type="text" class="form-control" id="poFornecedor" required></div><div class="form-group"><label>CNPJ</label><input type="text" class="form-control" id="poCnpj"></div><div class="form-group"><label>Vendedor</label><input type="text" class="form-control" id="poVendedor"></div></div><div><div class="form-group"><label>Centro de Custo</label><select class="form-control" id="poCentroCusto"><option value="">Selecione</option><option>PC 4501089929 - ANDRITZ - Bracell Lençóis Paulista - Montagem Tissue</option></select></div><div class="form-group"><label>Requisitante</label><input type="text" class="form-control" id="poRequisitante"></div><div class="form-group"><label>Condição Pagamento</label><select class="form-control" id="poCondicaoPagamento"><option>Boleto</option><option>Transferência</option><option>Pix</option></select></div><div class="form-group"><label>Status</label><select class="form-control" id="poStatus"><option>Em Andamento</option><option>Aprovado</option><option>Cancelado</option></select></div></div></div><div class="card-header"><h2>Itens</h2><button type="button" class="btn btn-primary btn-sm" onclick="addPoItem()"><i class="fas fa-plus"></i> Adicionar</button></div><div id="poItemsContainer"><div class="po-item-row"><div class="grid-4"><input type="text" class="form-control" placeholder="Descrição"><input type="text" class="form-control" placeholder="Unid" style="width:80px"><input type="number" class="form-control" placeholder="Qtd" value="1" style="width:100px"><input type="number" class="form-control" placeholder="Preço Unit." step="0.01" value="0" style="width:120px"></div></div></div><div class="grid-2"><div><div class="form-group"><label>Desconto (R$)</label><input type="number" class="form-control" id="poDesconto" value="0" onchange="updatePoTotal()"></div><div class="form-group"><label>Frete (R$)</label><input type="number" class="form-control" id="poFrete" value="0" onchange="updatePoTotal()"></div></div><div style="text-align:right"><h3>Total: <span id="poTotalPreview" class="total-value">R$ 0.00</span></h3></div></div><div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px"><button type="button" class="btn btn-secondary" onclick="clearPoForm()">Limpar</button><button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Salvar</button></div></form>`;
        }
        
        function addPoItem() {
            let container = document.getElementById('poItemsContainer');
            if (!container) return;
            let div = document.createElement('div');
            div.className = 'po-item-row';
            div.innerHTML = `<div class="grid-4"><input type="text" class="form-control" placeholder="Descrição"><input type="text" class="form-control" placeholder="Unid" style="width:80px"><input type="number" class="form-control" placeholder="Qtd" value="1" style="width:100px"><input type="number" class="form-control" placeholder="Preço Unit." step="0.01" value="0" style="width:120px"></div><div style="text-align:right"><span class="item-remove" onclick="this.parentElement.parentElement.remove(); updatePoTotal()"><i class="fas fa-trash"></i> Remover</span></div>`;
            container.appendChild(div);
        }
        
        function updatePoTotal() {
            let total = 0;
            document.querySelectorAll('#poItemsContainer .po-item-row').forEach(row => {
                let qtd = parseFloat(row.querySelector('input[placeholder*="Qtd"]')?.value) || 0;
                let preco = parseFloat(row.querySelector('input[placeholder*="Preço Unit"]')?.value) || 0;
                total += qtd * preco;
            });
            let desconto = parseFloat(document.getElementById('poDesconto')?.value) || 0;
            let totalSpan = document.getElementById('poTotalPreview');
            if (totalSpan) totalSpan.textContent = `R$ ${(total - desconto).toFixed(2)}`;
        }
        
        function savePurchaseOrder(e) {
            e.preventDefault();
            let items = [];
            document.querySelectorAll('#poItemsContainer .po-item-row').forEach(row => {
                let desc = row.querySelector('input[placeholder*="Descrição"]')?.value;
                let unid = row.querySelector('input[placeholder*="Unid"]')?.value || 'und';
                let qtd = parseFloat(row.querySelector('input[placeholder*="Qtd"]')?.value) || 0;
                let preco = parseFloat(row.querySelector('input[placeholder*="Preço Unit"]')?.value) || 0;
                if (desc && qtd > 0 && preco > 0) items.push({ descricao: desc, unidade: unid, quantidade: qtd, precoUnitario: preco, total: qtd * preco });
            });
            if (items.length === 0) { showInfo('Adicione pelo menos um item!', 'error'); return; }
            purchaseOrders.push({ id: nextPoId, numero: nextPoId.toString(), data: document.getElementById('poData').value, fornecedor: document.getElementById('poFornecedor').value, cnpj: document.getElementById('poCnpj').value, vendedor: document.getElementById('poVendedor').value, centroCusto: document.getElementById('poCentroCusto').value, requisitante: document.getElementById('poRequisitante').value, condicaoPagamento: document.getElementById('poCondicaoPagamento').value, status: document.getElementById('poStatus').value, items, desconto: parseFloat(document.getElementById('poDesconto').value) || 0, frete: parseFloat(document.getElementById('poFrete').value) || 0 });
            nextPoId++;
            showInfo(`Pedido ${nextPoId-1} criado!`, 'success');
            clearPoForm();
            switchPoTab('lista');
            document.getElementById('po-lista').innerHTML = renderPoList();
        }
        
        function clearPoForm() {
            ['poFornecedor', 'poCnpj', 'poVendedor', 'poCentroCusto', 'poRequisitante'].forEach(f => { const el = document.getElementById(f); if (el) el.value = ''; });
            const desconto = document.getElementById('poDesconto'); if (desconto) desconto.value = '0';
            const frete = document.getElementById('poFrete'); if (frete) frete.value = '0';
            const container = document.getElementById('poItemsContainer');
            if (container) container.innerHTML = `<div class="po-item-row"><div class="grid-4"><input type="text" class="form-control" placeholder="Descrição"><input type="text" class="form-control" placeholder="Unid" style="width:80px"><input type="number" class="form-control" placeholder="Qtd" value="1" style="width:100px"><input type="number" class="form-control" placeholder="Preço Unit." step="0.01" value="0" style="width:120px"></div></div>`;
            updatePoTotal();
        }
        
        function viewPo(id) { let po = purchaseOrders.find(p => p.id === id); if (po) alert(`Pedido ${po.numero}\nFornecedor: ${po.fornecedor}\nTotal: R$ ${(po.items.reduce((s,i)=>s+i.total,0)-po.desconto).toFixed(2)}`); }
        
        async function exportPoToExcel(id) {
            let po = purchaseOrders.find(p => p.id === id);
            if (!po) { showInfo('Pedido não encontrado!', 'error'); return; }
            showLoading('Gerando Excel...');
            try {
                let response = await fetch('PC BASE.xlsx');
                let workbook = new ExcelJS.Workbook();
                if (response.ok) {
                    let arrayBuffer = await response.arrayBuffer();
                    await workbook.xlsx.load(arrayBuffer);
                } else {
                    workbook = new ExcelJS.Workbook();
                    workbook.addWorksheet('Pedido de Compra');
                }
                let worksheet = workbook.getWorksheet(1) || workbook.addWorksheet('Pedido de Compra');
                worksheet.getCell('C3').value = `PEDIDO DE COMPRA Nº ${po.numero}`;
                worksheet.getCell('B8').value = po.fornecedor;
                worksheet.getCell('B9').value = `CNPJ: ${po.cnpj || ''}`;
                worksheet.getCell('D12').value = po.centroCusto;
                worksheet.getCell('H12').value = po.requisitante;
                worksheet.getCell('H13').value = new Date(po.data).toLocaleDateString();
                worksheet.getCell('B17').value = po.fornecedor;
                worksheet.getCell('H20').value = po.condicaoPagamento;
                let startRow = 24;
                po.items.forEach((item, idx) => {
                    worksheet.getCell(`A${startRow + idx}`).value = item.descricao;
                    worksheet.getCell(`B${startRow + idx}`).value = item.unidade;
                    worksheet.getCell(`C${startRow + idx}`).value = item.quantidade;
                    worksheet.getCell(`D${startRow + idx}`).value = item.precoUnitario;
                    worksheet.getCell(`E${startRow + idx}`).value = item.total;
                });
                let subtotal = po.items.reduce((s,i)=>s+i.total,0);
                let totalRow = startRow + po.items.length;
                worksheet.getCell(`D${totalRow}`).value = 'SUBTOTAL';
                worksheet.getCell(`E${totalRow}`).value = subtotal;
                worksheet.getCell(`D${totalRow+1}`).value = 'DESCONTO';
                worksheet.getCell(`E${totalRow+1}`).value = po.desconto;
                worksheet.getCell(`D${totalRow+2}`).value = 'FRETE';
                worksheet.getCell(`E${totalRow+2}`).value = po.frete;
                worksheet.getCell(`D${totalRow+3}`).value = 'TOTAL';
                worksheet.getCell(`E${totalRow+3}`).value = subtotal - po.desconto + po.frete;
                let buffer = await workbook.xlsx.writeBuffer();
                saveAs(new Blob([buffer]), `Pedido_Compra_${po.numero}.xlsx`);
                showInfo('Excel gerado com sucesso!', 'success');
            } catch (error) { hideLoading(); showInfo('Erro: ' + error.message, 'error'); }
            hideLoading();
        }
        
        function deletePo(id) { if (confirm('Excluir este pedido?')) { purchaseOrders = purchaseOrders.filter(p => p.id !== id); document.getElementById('po-lista').innerHTML = renderPoList(); showInfo('Pedido excluído!', 'success'); } }
        function showNewPoForm() { switchPoTab('novo'); clearPoForm(); }
        function switchPoTab(tab, event) {
            if (event && event.currentTarget) { document.querySelectorAll('#pedido_compra .tabs .tab, .card .tabs .tab').forEach(t => t.classList.remove('active')); event.currentTarget.classList.add('active'); }
            const listaDiv = document.getElementById('po-lista'), novoDiv = document.getElementById('po-novo');
            if (listaDiv && novoDiv) { if (tab === 'lista') { listaDiv.classList.add('active'); novoDiv.classList.remove('active'); } else { novoDiv.classList.add('active'); listaDiv.classList.remove('active'); } }
        }
        
        function downloadDocument(url, nome) { window.open(url, '_blank'); showInfo(`Abrindo ${nome}`, 'success'); }
        
        async function changePage(page, event) {
            if (event && event.currentTarget) {
                document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
                event.currentTarget.classList.add('active');
            }
            const titles = { dashboard: 'Dashboard EAP', eap: 'EAP - Estrutura Analítica', documentos: 'Documentos', upload: 'Upload de Documentos', pedido_compra: 'Pedido de Compra' };
            document.getElementById('pageTitle').textContent = titles[page] || page;
            await loadContent(page);
        }
        
        async function loadContent(page) {
            const area = document.getElementById('contentArea');
            if (!area) return;
            area.style.opacity = '0';
            setTimeout(async () => {
                if (page === 'dashboard') area.innerHTML = renderDashboard();
                else if (page === 'eap') area.innerHTML = renderEapPage();
                else if (page === 'documentos') area.innerHTML = renderDocumentosPage();
                else if (page === 'upload') area.innerHTML = renderUploadPage();
                else if (page === 'pedido_compra') area.innerHTML = renderPedidoCompra();
                area.style.opacity = '1';
            }, 200);
        }
        
        window.changePage = changePage;
        window.selectEapNode = selectEapNode;
        window.filterDocuments = filterDocuments;
        window.downloadDocument = downloadDocument;
        window.prepareUpload = prepareUpload;
        window.cancelUpload = cancelUpload;
        window.uploadDocument = uploadDocument;
        window.showNewPoForm = showNewPoForm;
        window.addPoItem = addPoItem;
        window.updatePoTotal = updatePoTotal;
        window.savePurchaseOrder = savePurchaseOrder;
        window.clearPoForm = clearPoForm;
        window.viewPo = viewPo;
        window.exportPoToExcel = exportPoToExcel;
        window.deletePo = deletePo;
        window.switchPoTab = switchPoTab;
        
        window.onload = async () => {
            showLoading('Carregando sistema...');
            await loadDocumentosFromSupabase();
            hideLoading();
            await loadContent('dashboard');
            showInfo(`Sistema carregado! ${documentos.length} documentos encontrados.`, 'success');
        };
    </script>
</body>
</html>
